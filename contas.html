<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF CONTAS — Nível 15</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --neon: #ff9500;
    --neon2: #ff003c;
    --accent: #ffcc00;
    --bg: #080505;
    --card: #120a00;
    --border: rgba(255,149,0,.15);
    --text: #f0dfc8;
    --muted: #7a5a30;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,149,0,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,149,0,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none; z-index:0;
  }
  body::after {
    content:'';
    position:fixed; top:0; left:50%; transform:translateX(-50%);
    width:800px; height:400px;
    background: radial-gradient(ellipse, rgba(255,149,0,.06) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }

  header {
    position:relative; z-index:10;
    padding: 22px 40px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    background: rgba(8,5,0,.85);
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.5rem; font-weight: 900; letter-spacing: .15em;
    background: linear-gradient(90deg, var(--neon), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 12px var(--neon));
  }
  .badge {
    font-family:'Orbitron', monospace; font-size:.6rem;
    letter-spacing:.2em; color: var(--accent);
    border: 1px solid var(--accent); padding: 5px 14px;
    text-transform:uppercase;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 6px var(--neon);} 50%{box-shadow:0 0 20px var(--neon);} }

  .hero {
    position:relative; z-index:2;
    text-align:center; padding: 65px 20px 45px;
  }
  .hero-tag { font-size:.7rem; letter-spacing:.4em; color: var(--neon2); text-transform:uppercase; margin-bottom:14px; }
  .hero h1 {
    font-family:'Orbitron', monospace;
    font-size: clamp(1.8rem,6vw,4rem); font-weight:900; line-height:1.1;
    text-transform:uppercase; color:#fff;
    text-shadow: 0 0 40px var(--neon), 0 0 80px rgba(255,149,0,.3);
  }
  .hero h1 em { color: var(--accent); font-style:normal; }
  .hero p { margin-top:14px; font-size:1.05rem; color: var(--muted); letter-spacing:.05em; }

  /* LEVEL BADGE */
  .level-banner {
    position:relative; z-index:2;
    display:flex; align-items:center; justify-content:center; gap:12px;
    margin-bottom:36px;
  }
  .level-pill {
    background: linear-gradient(90deg, rgba(255,149,0,.15), rgba(255,204,0,.1));
    border: 1px solid rgba(255,149,0,.4);
    padding: 8px 24px;
    font-family:'Orbitron', monospace; font-size:.7rem;
    font-weight:700; letter-spacing:.2em; color: var(--accent);
    text-transform:uppercase;
  }
  .star { color: var(--accent); font-size:1rem; }

  /* FILTER */
  .filter-bar {
    position:relative; z-index:2;
    display:flex; gap:10px; flex-wrap:wrap;
    justify-content:center; padding: 0 20px 36px;
  }
  .filter-btn {
    background:transparent; border: 1px solid rgba(255,149,0,.2);
    color: var(--muted); font-family:'Rajdhani', sans-serif;
    font-size:.82rem; font-weight:600; letter-spacing:.1em;
    text-transform:uppercase; padding: 7px 18px; cursor:pointer; transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--neon); color: var(--neon);
    box-shadow: 0 0 12px var(--neon); background: rgba(255,149,0,.07);
  }

  /* GRID */
  .grid {
    position:relative; z-index:2;
    display:grid; grid-template-columns: repeat(auto-fill, minmax(285px,1fr));
    gap: 22px; padding: 0 40px 80px;
    max-width:1400px; margin:0 auto;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid rgba(255,149,0,.12);
    position:relative; overflow:hidden;
    transition: transform .3s, box-shadow .3s;
    animation: fadeUp .5s ease both;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    opacity:0; transition: opacity .3s;
  }
  .card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(255,149,0,.12); }
  .card:hover::before { opacity:1; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

  /* LEVEL BADGE ON CARD */
  .card-level-badge {
    position:absolute; top:12px; right:12px; z-index:2;
    background: linear-gradient(135deg, #ff9500, #ffcc00);
    color: #000; font-family:'Orbitron', monospace;
    font-size:.6rem; font-weight:900; letter-spacing:.1em;
    padding: 4px 10px; text-transform:uppercase;
  }
  .card-img {
    width:100%; height:175px; object-fit:cover; display:block; background: #1a0f00;
  }
  .card-img-placeholder {
    width:100%; height:175px;
    background: linear-gradient(135deg, #1a0f00, #2a1800);
    display:flex; align-items:center; justify-content:center;
    font-size:2.5rem; color:rgba(255,149,0,.3);
  }
  .card-body { padding:16px; }
  .card-cat {
    font-size:.62rem; letter-spacing:.25em; text-transform:uppercase;
    color: var(--neon2); font-weight:600; margin-bottom:7px;
  }
  .card-title {
    font-family:'Orbitron', monospace; font-size:.9rem; font-weight:700;
    color:#fff; margin-bottom:7px; line-height:1.3;
  }
  .card-bio {
    font-size:.83rem; color: var(--muted); line-height:1.5;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; margin-bottom:13px;
  }
  .card-footer { display:flex; align-items:center; justify-content:space-between; }
  .card-price {
    font-family:'Orbitron', monospace; font-size:1rem; font-weight:700;
    color: var(--accent); text-shadow: 0 0 10px var(--accent);
  }
  .ver-mais-btn {
    background:transparent; border: 1px solid var(--neon);
    color: var(--neon); font-family:'Rajdhani', sans-serif;
    font-size:.78rem; font-weight:700; letter-spacing:.15em;
    text-transform:uppercase; padding: 7px 15px; cursor:pointer; transition: all .2s;
  }
  .ver-mais-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

  /* STATES */
  .state-msg { grid-column:1/-1; text-align:center; padding:80px 20px; }
  .state-msg .icon { font-size:3rem; margin-bottom:16px; opacity:.3; }
  .state-msg p { font-family:'Orbitron', monospace; font-size:.85rem; letter-spacing:.2em; color: var(--muted); }
  .spinner { width:38px; height:38px; border:2px solid rgba(255,149,0,.2); border-top-color: var(--neon); border-radius:50%; animation: spin 1s linear infinite; margin:0 auto 14px; }
  @keyframes spin { to{transform:rotate(360deg);} }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.88);
    backdrop-filter:blur(8px); z-index:1000;
    display:flex; align-items:center; justify-content:center;
    padding:20px; opacity:0; pointer-events:none; transition: opacity .3s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background: var(--card);
    border: 1px solid var(--neon);
    box-shadow: 0 0 60px rgba(255,149,0,.2), 0 0 120px rgba(255,149,0,.06);
    max-width:600px; width:100%; max-height:90vh; overflow-y:auto;
    position:relative; transform:scale(.92); transition:transform .3s;
  }
  .modal-overlay.open .modal { transform:scale(1); }
  .modal-close {
    position:absolute; top:13px; right:15px;
    background:none; border:none; color:#fff; font-size:1.4rem;
    cursor:pointer; opacity:.5; transition:opacity .2s; z-index:2;
  }
  .modal-close:hover { opacity:1; }
  .modal-img { width:100%; max-height:300px; object-fit:cover; display:block; }
  .modal-img-placeholder {
    width:100%; height:220px;
    background: linear-gradient(135deg,#1a0f00,#2a1800);
    display:flex; align-items:center; justify-content:center;
    font-size:4rem; color:rgba(255,149,0,.2);
  }
  .modal-content { padding:26px; }
  .modal-cat { font-size:.62rem; letter-spacing:.3em; text-transform:uppercase; color:var(--neon2); font-weight:600; margin-bottom:8px; }
  .modal-title { font-family:'Orbitron', monospace; font-size:1.2rem; font-weight:900; color:#fff; margin-bottom:12px; line-height:1.3; }
  .modal-bio { font-size:.92rem; color:#a07040; line-height:1.7; margin-bottom:18px; }
  .modal-tags {
    display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;
  }
  .modal-tag {
    background:rgba(255,149,0,.1); border:1px solid rgba(255,149,0,.3);
    color: var(--neon); font-size:.65rem; letter-spacing:.15em;
    text-transform:uppercase; padding:4px 10px;
  }
  .modal-price-row {
    display:flex; align-items:center; justify-content:space-between;
    border-top:1px solid rgba(255,149,0,.15); padding-top:18px;
  }
  .modal-price { font-family:'Orbitron', monospace; font-size:1.4rem; font-weight:900; color:var(--accent); text-shadow:0 0 15px var(--accent); }
  .modal-buy-btn {
    background: linear-gradient(90deg, #25D366, #1da851);
    border:none; color:#fff; font-family:'Orbitron', monospace;
    font-size:.72rem; font-weight:700; letter-spacing:.15em;
    text-transform:uppercase; padding:12px 24px; cursor:pointer;
    transition: box-shadow .2s, transform .2s; text-decoration:none;
    display:inline-flex; align-items:center; gap:8px;
  }
  .modal-buy-btn:hover { box-shadow:0 0 30px #25D366; transform:scale(1.04); }

  footer {
    position:relative; z-index:2; text-align:center;
    padding:28px; border-top:1px solid rgba(255,149,0,.06);
    font-size:.72rem; letter-spacing:.2em; color:#3a2010;
  }

  @media(max-width:600px) {
    header { padding:14px 18px; }
    .grid { padding:0 14px 50px; }
    .hero { padding:45px 14px 28px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">FF CONTAS</div>
  <div class="badge">★ NV 15</div>
</header>

<section class="hero">
  <div class="hero-tag">// Free Fire Accounts</div>
  <h1>Contas <em>Nível 15</em><br>Verificadas</h1>
  <p>Contas prontas para jogar, entregues na hora</p>
</section>

<div class="level-banner">
  <span class="star">★</span>
  <div class="level-pill">Todas as contas nível 15+</div>
  <span class="star">★</span>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="filterPosts('todos')">Todos</button>
</div>

<div class="grid" id="grid">
  <div class="state-msg">
    <div class="spinner"></div>
    <p>Carregando contas...</p>
  </div>
</div>

<footer>© FF CONTAS — Contas verificadas. Entrega imediata.</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBzPZpW13eHxcXSUKUuCD0viXvCRMDbAE0",
    authDomain: "auth-d43e9.firebaseapp.com",
    databaseURL: "https://auth-d43e9-default-rtdb.firebaseio.com",
    projectId: "auth-d43e9",
    storageBucket: "auth-d43e9.firebasestorage.app",
    messagingSenderId: "688216918202",
    appId: "1:688216918202:web:dcc7b6e7da96deede5da83",
    measurementId: "G-85V167H4E0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let allPosts = [];
  let activeFilter = 'todos';

  const grid = document.getElementById('grid');
  const filterBar = document.getElementById('filterBar');

  onValue(ref(db, 'contas'), (snap) => {
    allPosts = [];
    const data = snap.val();
    if (data) Object.entries(data).forEach(([id, val]) => allPosts.push({ id, ...val }));
    allPosts.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    buildFilters();
    renderGrid(activeFilter);
  });

  function buildFilters() {
    const cats = ['todos', ...new Set(allPosts.map(p => p.categoria).filter(Boolean))];
    filterBar.innerHTML = cats.map(c =>
      `<button class="filter-btn ${c===activeFilter?'active':''}" onclick="filterPosts('${c}')">${c.toUpperCase()}</button>`
    ).join('');
  }

  window.filterPosts = (cat) => { activeFilter = cat; buildFilters(); renderGrid(cat); };

  function renderGrid(cat) {
    const items = cat === 'todos' ? allPosts : allPosts.filter(p => p.categoria === cat);
    if (!items.length) {
      grid.innerHTML = `<div class="state-msg"><div class="icon">🎮</div><p>Nenhuma conta encontrada</p></div>`;
      return;
    }
    grid.innerHTML = items.map((p, i) => `
      <div class="card" style="animation-delay:${i*0.06}s">
        <div class="card-level-badge">NV ${p.nivel||'15'}</div>
        ${p.imagem
          ? `<img class="card-img" src="${p.imagem}" alt="${p.titulo}" onerror="this.style.display='none'">`
          : `<div class="card-img-placeholder">🎮</div>`}
        <div class="card-body">
          <div class="card-cat">${p.categoria || 'CONTA FF'}</div>
          <div class="card-title">${p.titulo || 'Conta Free Fire'}</div>
          <div class="card-bio">${p.bio || p.descricao || ''}</div>
          <div class="card-footer">
            <span class="card-price">${p.valor ? 'R$ '+p.valor : 'GRÁTIS'}</span>
            <button class="ver-mais-btn" onclick="openModal('${p.id}')">Ver Mais</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  window.openModal = (id) => {
    const p = allPosts.find(x => x.id === id);
    if (!p) return;
    const tags = [p.categoria, p.nivel ? 'NV '+p.nivel : 'NV 15', p.servidor].filter(Boolean);
    document.getElementById('modalBody').innerHTML = `
      ${p.imagem
        ? `<img class="modal-img" src="${p.imagem}" alt="${p.titulo}">`
        : `<div class="modal-img-placeholder">🎮</div>`}
      <div class="modal-content">
        <div class="modal-cat">${p.categoria || 'CONTA FF'}</div>
        <div class="modal-title">${p.titulo || 'Conta Free Fire'}</div>
        <div class="modal-bio">${p.bio || p.descricao || 'Sem descrição disponível.'}</div>
        ${tags.length ? `<div class="modal-tags">${tags.map(t=>`<span class="modal-tag">${t}</span>`).join('')}</div>` : ''}
        <div class="modal-price-row">
          <span class="modal-price">${p.valor ? 'R$ '+p.valor : 'GRÁTIS'}</span>
          <a href="https://wa.me/5515996228860?text=Olá!%20Tenho%20interesse%20na%20conta%3A%20${encodeURIComponent(p.titulo||'Conta Free Fire')}" target="_blank" style="text-decoration:none">
            <button class="modal-buy-btn">💬 Adquirir Agora</button>
          </a>
        </div>
      </div>
    `;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeModal = (e) => { if (e.target.id === 'modalOverlay') closeModalDirect(); };
  window.closeModalDirect = () => {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  };
</script>
</body>
</html>
