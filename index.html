<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF HACKS — Store</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --neon: #00ffe7;
    --neon2: #ff003c;
    --gold: #ffd700;
    --bg: #050a0f;
    --card: #0a1420;
    --border: #0ff3;
    --text: #c8e6f0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* BG grid */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(0,255,231,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,231,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
    z-index:0;
  }

  /* HEADER */
  header {
    position:relative;
    z-index:10;
    padding: 24px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    background: rgba(5,10,15,.8);
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: .15em;
    background: linear-gradient(90deg, var(--neon), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 12px var(--neon));
  }
  .logo span { color: var(--neon2); -webkit-text-fill-color: var(--neon2); filter: none; }
  .badge {
    font-family:'Orbitron', monospace;
    font-size:.65rem;
    letter-spacing:.2em;
    color: var(--neon);
    border: 1px solid var(--neon);
    padding: 5px 14px;
    text-transform:uppercase;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1; box-shadow:0 0 6px var(--neon);} 50%{opacity:.6; box-shadow:0 0 20px var(--neon);} }

  /* HERO */
  .hero {
    position:relative;
    z-index:2;
    text-align:center;
    padding: 70px 20px 50px;
  }
  .hero-tag {
    font-size:.75rem;
    letter-spacing:.4em;
    color: var(--neon2);
    text-transform:uppercase;
    margin-bottom:16px;
  }
  .hero h1 {
    font-family:'Orbitron', monospace;
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight:900;
    line-height:1.1;
    text-transform:uppercase;
    color:#fff;
    text-shadow: 0 0 40px var(--neon), 0 0 80px rgba(0,255,231,.3);
  }
  .hero h1 em { color: var(--neon); font-style:normal; }
  .hero p {
    margin-top:16px;
    font-size:1.1rem;
    color:#7aa8b8;
    letter-spacing:.05em;
  }

  /* FILTER BAR */
  .filter-bar {
    position:relative;
    z-index:2;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    padding: 0 20px 40px;
  }
  .filter-btn {
    background:transparent;
    border: 1px solid #0ff4;
    color: #7aa8b8;
    font-family:'Rajdhani', sans-serif;
    font-size:.85rem;
    font-weight:600;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding: 8px 20px;
    cursor:pointer;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--neon);
    color: var(--neon);
    box-shadow: 0 0 12px var(--neon);
    background: rgba(0,255,231,.07);
  }

  /* GRID */
  .grid {
    position:relative;
    z-index:2;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
    padding: 0 40px 80px;
    max-width:1400px;
    margin:0 auto;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid #0ff2;
    position:relative;
    overflow:hidden;
    transition: transform .3s, box-shadow .3s;
    animation: fadeUp .5s ease both;
  }
  .card::before {
    content:'';
    position:absolute;
    top:0; left:0; right:0;
    height:2px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    opacity:0;
    transition: opacity .3s;
  }
  .card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(0,255,231,.12); }
  .card:hover::before { opacity:1; }
  @keyframes fadeUp { from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:translateY(0);} }

  .card-img {
    width:100%;
    height:180px;
    object-fit:cover;
    display:block;
    background: #0d1f2d;
  }
  .card-img-placeholder {
    width:100%;
    height:180px;
    background: linear-gradient(135deg, #0d1f2d, #0a2a3d);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:3rem;
    color:#0ff3;
  }
  .card-body { padding:18px; }
  .card-cat {
    font-size:.65rem;
    letter-spacing:.25em;
    text-transform:uppercase;
    color: var(--neon2);
    font-weight:600;
    margin-bottom:8px;
  }
  .card-title {
    font-family:'Orbitron', monospace;
    font-size:.95rem;
    font-weight:700;
    color:#fff;
    margin-bottom:8px;
    line-height:1.3;
  }
  .card-bio {
    font-size:.85rem;
    color:#6a9ab0;
    line-height:1.5;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    margin-bottom:14px;
  }
  .card-footer {
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .card-price {
    font-family:'Orbitron', monospace;
    font-size:1.05rem;
    font-weight:700;
    color: var(--gold);
    text-shadow: 0 0 10px var(--gold);
  }
  .ver-mais-btn {
    background: transparent;
    border: 1px solid var(--neon);
    color: var(--neon);
    font-family:'Rajdhani', sans-serif;
    font-size:.8rem;
    font-weight:700;
    letter-spacing:.15em;
    text-transform:uppercase;
    padding: 7px 16px;
    cursor:pointer;
    transition: all .2s;
  }
  .ver-mais-btn:hover {
    background: var(--neon);
    color: #000;
    box-shadow: 0 0 20px var(--neon);
  }

  /* EMPTY / LOADING */
  .state-msg {
    grid-column: 1/-1;
    text-align:center;
    padding:80px 20px;
  }
  .state-msg .icon { font-size:3rem; margin-bottom:16px; opacity:.4; }
  .state-msg p { font-family:'Orbitron', monospace; font-size:.9rem; letter-spacing:.2em; color:#3a6a80; }
  .spinner {
    width:40px; height:40px;
    border:2px solid #0ff2;
    border-top-color: var(--neon);
    border-radius:50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to{transform:rotate(360deg);} }

  /* MODAL */
  .modal-overlay {
    position:fixed;
    inset:0;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(8px);
    z-index:1000;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    opacity:0;
    pointer-events:none;
    transition: opacity .3s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background: var(--card);
    border: 1px solid var(--neon);
    box-shadow: 0 0 60px rgba(0,255,231,.2), 0 0 120px rgba(0,255,231,.08);
    max-width:600px;
    width:100%;
    max-height:90vh;
    overflow-y:auto;
    position:relative;
    transform: scale(.92);
    transition: transform .3s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-close {
    position:absolute;
    top:14px; right:16px;
    background:none;
    border:none;
    color:#fff;
    font-size:1.5rem;
    cursor:pointer;
    line-height:1;
    opacity:.6;
    transition: opacity .2s;
    z-index:2;
  }
  .modal-close:hover { opacity:1; }
  .modal-img { width:100%; max-height:300px; object-fit:cover; display:block; }
  .modal-img-placeholder {
    width:100%; height:220px;
    background: linear-gradient(135deg,#0d1f2d,#0a2a3d);
    display:flex; align-items:center; justify-content:center;
    font-size:4rem; color:#0ff3;
  }
  .modal-content { padding:28px; }
  .modal-cat {
    font-size:.65rem; letter-spacing:.3em; text-transform:uppercase;
    color: var(--neon2); font-weight:600; margin-bottom:10px;
  }
  .modal-title {
    font-family:'Orbitron', monospace;
    font-size:1.3rem; font-weight:900; color:#fff; margin-bottom:14px; line-height:1.3;
  }
  .modal-bio { font-size:.95rem; color:#9cc4d4; line-height:1.7; margin-bottom:20px; }
  .modal-price-row {
    display:flex; align-items:center; justify-content:space-between;
    border-top:1px solid #0ff2; padding-top:18px;
  }
  .modal-price {
    font-family:'Orbitron', monospace; font-size:1.5rem; font-weight:900;
    color: var(--gold); text-shadow: 0 0 15px var(--gold);
  }
  .modal-buy-btn {
    background: linear-gradient(90deg, var(--neon), #00c8b4);
    border:none; color:#000;
    font-family:'Orbitron', monospace; font-size:.75rem;
    font-weight:700; letter-spacing:.15em; text-transform:uppercase;
    padding:12px 28px; cursor:pointer;
    transition: box-shadow .2s, transform .2s;
  }
  .modal-buy-btn:hover { box-shadow:0 0 30px var(--neon); transform:scale(1.04); }

  /* FOOTER */
  footer {
    position:relative; z-index:2;
    text-align:center;
    padding:30px;
    border-top:1px solid #0ff1;
    font-size:.75rem;
    letter-spacing:.2em;
    color:#2a5060;
  }

  @media(max-width:600px) {
    header { padding:16px 20px; }
    .grid { padding:0 16px 60px; }
    .hero { padding:50px 16px 30px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Atlas<span></span>Xiters</div>
  <div class="badge">● Online</div>
</header>

<section class="hero">
  <div class="hero-tag">// Free Fire Shop</div>
  <h1>Domine o<br><em>Campo de Batalha</em></h1>
  <p>Ferramentas exclusivas para jogadores de elite</p>
</section>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="filterPosts('todos')">Todos</button>
</div>

<div class="grid" id="grid">
  <div class="state-msg">
    <div class="spinner"></div>
    <p>Carregando produtos...</p>
  </div>
</div>

<footer>© FF.HACKS — Uso exclusivo. Todos os direitos reservados.</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBzPZpW13eHxcXSUKUuCD0viXvCRMDbAE0",
    authDomain: "auth-d43e9.firebaseapp.com",
    databaseURL: "https://auth-d43e9-default-rtdb.firebaseio.com",
    projectId: "auth-d43e9",
    storageBucket: "auth-d43e9.firebasestorage.app",
    messagingSenderId: "688216918202",
    appId: "1:688216918202:web:dcc7b6e7da96deede5da83",
    measurementId: "G-85V167H4E0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let allPosts = [];
  let activeFilter = 'todos';

  const grid = document.getElementById('grid');
  const filterBar = document.getElementById('filterBar');

  onValue(ref(db, 'hacks'), (snap) => {
    allPosts = [];
    const data = snap.val();
    if (data) {
      Object.entries(data).forEach(([id, val]) => allPosts.push({ id, ...val }));
      allPosts.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    }
    buildFilters();
    renderGrid(activeFilter);
  });

  function buildFilters() {
    const cats = ['todos', ...new Set(allPosts.map(p => p.categoria).filter(Boolean))];
    filterBar.innerHTML = cats.map(c =>
      `<button class="filter-btn ${c===activeFilter?'active':''}" onclick="filterPosts('${c}')">${c.toUpperCase()}</button>`
    ).join('');
  }

  window.filterPosts = (cat) => {
    activeFilter = cat;
    buildFilters();
    renderGrid(cat);
  };

  function renderGrid(cat) {
    const items = cat === 'todos' ? allPosts : allPosts.filter(p => p.categoria === cat);
    if (!items.length) {
      grid.innerHTML = `<div class="state-msg"><div class="icon">⚡</div><p>Nenhum produto encontrado</p></div>`;
      return;
    }
    grid.innerHTML = items.map((p, i) => `
      <div class="card" style="animation-delay:${i*0.06}s">
        ${p.imagem
          ? `<img class="card-img" src="${p.imagem}" alt="${p.titulo}" onerror="this.style.display='none'">`
          : `<div class="card-img-placeholder">⚡</div>`}
        <div class="card-body">
          <div class="card-cat">${p.categoria || 'HACK'}</div>
          <div class="card-title">${p.titulo || 'Sem título'}</div>
          <div class="card-bio">${p.bio || p.descricao || ''}</div>
          <div class="card-footer">
            <span class="card-price">${p.valor ? 'R$ '+p.valor : 'GRÁTIS'}</span>
            <button class="ver-mais-btn" onclick="openModal('${p.id}')">Ver Mais</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  window.openModal = (id) => {
    const p = allPosts.find(x => x.id === id);
    if (!p) return;
    document.getElementById('modalBody').innerHTML = `
      ${p.imagem
        ? `<img class="modal-img" src="${p.imagem}" alt="${p.titulo}">`
        : `<div class="modal-img-placeholder">⚡</div>`}
      <div class="modal-content">
        <div class="modal-cat">${p.categoria || 'HACK'}</div>
        <div class="modal-title">${p.titulo || 'Sem título'}</div>
        <div class="modal-bio">${p.bio || p.descricao || 'Sem descrição disponível.'}</div>
        <div class="modal-price-row">
          <span class="modal-price">${p.valor ? 'R$ '+p.valor : 'GRÁTIS'}</span>
          <a href="https://wa.me/5515996228860?text=Olá!%20Tenho%20interesse%20no%20produto%3A%20${encodeURIComponent(p.titulo||'')}" target="_blank" style="text-decoration:none"><button class="modal-buy-btn">Adquirir Agora</button></a>
        </div>
      </div>
    `;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeModal = (e) => {
    if (e.target.id === 'modalOverlay') closeModalDirect();
  };
  window.closeModalDirect = () => {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  };
</script>
</body>
</html>
